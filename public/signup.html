<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | EduChain</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="dark-mode">
<canvas id="bgCanvas"></canvas>

<div class="container">

    <!-- LEFT PANEL (same as login) -->
    <div class="left-panel">
        <h2 class="logo">EduChain</h2>
        <p class="tagline">Learn. Grow. Achieve.</p>

        <h1>Stay Consistent</h1>
        <h1 class="highlight">Build Your Future 🚀</h1>

        <p class="switch">
            Already have an account? <a href="login.html">Sign In</a>
        </p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <div class="auth-card">

            <h2>Create Account</h2>
            <p class="subtitle">Join EduChain and start learning today</p>

            <form id="signupForm">

                <div class="input-group">
                    <input type="text" id="name" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <button type="submit" class="auth-btn">Sign Up</button>

            </form>

        </div>
    </div>

</div>

<script>

const signupForm = document.getElementById("signupForm");

signupForm.addEventListener("submit", async (e) => {

e.preventDefault();

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const response = await fetch("/api/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
password
})

});

const data = await response.json();

alert(data.message);

if(data.message === "User registered successfully"){

localStorage.setItem("user", JSON.stringify({
    name: name,
    email: email,
    profilePic: null
}));

window.location.href="/index.html";

}

});

</script>
<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 2;
    this.dx = (Math.random() - 0.5) * 0.5;
    this.dy = (Math.random() - 0.5) * 0.5;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#7c83fd";
    ctx.fill();
  }

  update() {
    this.x += this.dx;
    this.y += this.dy;

    if (this.x < 0 || this.x > canvas.width) this.dx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.dy *= -1;

    this.draw();
  }
}

for (let i = 0; i < 80; i++) {
  particles.push(new Particle());
}

function connect() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = dx * dx + dy * dy;

      if (dist < 8000) {
        ctx.strokeStyle = "rgba(124,131,253,0.1)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => p.update());
  connect();
  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
