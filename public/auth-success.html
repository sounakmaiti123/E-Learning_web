<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing In... | EduChain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020617;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-success {
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .auth-success .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
            animation: scaleIn 0.5s ease 0.3s both;
        }

        .auth-success h2 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .auth-success p {
            color: #9ca3af;
            font-size: 15px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #7c83fd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="auth-success">
    <div class="checkmark">✓</div>
    <h2>Welcome to EduChain!</h2>
    <p>Signing you in with Google...</p>
    <div class="spinner"></div>
</div>

<script>
// Extract user data from URL params
const params = new URLSearchParams(window.location.search);
const userData = params.get("user");

if (userData) {
    try {
        const user = JSON.parse(decodeURIComponent(userData));

        // Store in localStorage (same format as manual login)
        localStorage.setItem("user", JSON.stringify(user));

        // Redirect to home after a brief animation
        setTimeout(() => {
            window.location.href = "/index.html";
        }, 1500);

    } catch (e) {
        console.error("Failed to parse user data:", e);
        document.querySelector("h2").textContent = "Something went wrong";
        document.querySelector("p").textContent = "Redirecting to login...";
        setTimeout(() => {
            window.location.href = "/login.html";
        }, 2000);
    }
} else {
    // No user data, redirect to login
    window.location.href = "/login.html";
}
</script>

</body>
</html>
