<!DOCTYPE html>
<html>
<head>
<title>Upload Course | EduChain</title>
<link rel="stylesheet" href="css/auth.css">
</head>
<body class="dark-mode">

<script src="js/script.js"></script>
<script>
requireLogin();
</script>

<!-- NAVBAR (same as homepage if needed) -->

<div class="upload-section">

    <!-- LEFT SIDE -->
    <div class="upload-left">
        <h1>Upload Your <span>Course</span></h1>

        <p>
            Share your knowledge with the world. Add your course,
            reach thousands of learners, and grow your impact.
        </p>

        <div class="features">
            <div>✔ Easy Upload</div>
            <div>✔ Secure Content</div>
            <div>✔ Global Reach</div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="upload-right">

        <div class="upload-card">

            <h2>Upload New Course</h2>

            <form id="courseForm">

                <input type="text" id="title" placeholder="Course Title" required>

                <input type="text" id="instructor" placeholder="Instructor Name" required>

                <input type="number" id="price" placeholder="Course Price" required>

                <input type="text" id="thumbnail" placeholder="Thumbnail Image URL">

                <textarea id="description" placeholder="Course Description"></textarea>

                <button type="submit">Upload Course</button>

            </form>

        </div>

    </div>

</div>

<script src="js/course.js"></script>

</body>
</html>
