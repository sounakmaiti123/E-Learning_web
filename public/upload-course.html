<!DOCTYPE html>
<html>
<head>
<title>Upload Course | EduChain</title>
<link rel="stylesheet" href="css/auth.css">
<style>
    .file-upload-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 18px;
        text-align: left;
    }
    .file-upload-group label {
        font-size: 13px;
        font-weight: 600;
        color: #818cf8;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }
    .file-upload-group input[type="file"] {
        background: #151a2e;
        color: #e5e7eb;
        border: 1px solid #2a2f55;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s ease;
    }
    .file-upload-group input[type="file"]::file-selector-button {
        background: #6366f1;
        color: #ffffff;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        margin-right: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s ease;
    }
    .file-upload-group input[type="file"]::file-selector-button:hover {
        background: #4f46e5;
    }
    .file-upload-group input[type="file"]:hover {
        border-color: #6366f1;
    }
    /* Spinner style for uploads */
    .spinner {
        display: none;
        width: 24px;
        height: 24px;
        border: 3px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #ffffff;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    button[type="submit"] {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 14px;
        font-weight: 600;
    }
</style>
</head>
<body class="dark-mode">
<canvas id="bgCanvas"></canvas>
<script src="js/script.js"></script>
<script>
requireTeacher();
</script>

<!-- NAVBAR (same as homepage if needed) -->

<div class="upload-section">

    <!-- LEFT SIDE -->
    <div class="upload-left">
        <h1>Upload Your <span>Course</span></h1>

        <p>
            Share your knowledge with the world. Add your course,
            reach thousands of learners, and grow your impact.
        </p>

        <div class="features">
            <div>✔ Easy Upload</div>
            <div>✔ Secure Content</div>
            <div>✔ Global Reach</div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="upload-right">

        <div class="upload-card">

            <h2>Upload New Course</h2>

            <form id="courseForm">

                <input type="text" id="title" placeholder="Course Title" required>

                <input type="text" id="instructor" placeholder="Instructor Name" required>

                <input type="hidden" id="price" value="0">

                <div class="file-upload-group">
                    <label for="thumbnail">Course Thumbnail</label>
                    <input type="file" id="thumbnail" accept="image/*" required>
                </div>

                <div class="file-upload-group">
                    <label for="video">Course Video (MP4)</label>
                    <input type="file" id="video" accept="video/*" required>
                </div>

                <textarea id="description" placeholder="Course Description" required></textarea>

                <button type="submit">
                    <span id="btnText">Upload Course</span>
                    <div id="btnSpinner" class="spinner"></div>
                </button>

            </form>

        </div>

    </div>

</div>

<script src="js/course.js"></script>
<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 2;
    this.dx = (Math.random() - 0.5) * 0.5;
    this.dy = (Math.random() - 0.5) * 0.5;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#7c83fd";
    ctx.fill();
  }

  update() {
    this.x += this.dx;
    this.y += this.dy;

    if (this.x < 0 || this.x > canvas.width) this.dx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.dy *= -1;

    this.draw();
  }
}

for (let i = 0; i < 80; i++) {
  particles.push(new Particle());
}

function connect() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = dx * dx + dy * dy;

      if (dist < 8000) {
        ctx.strokeStyle = "rgba(124,131,253,0.1)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => p.update());
  connect();
  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
